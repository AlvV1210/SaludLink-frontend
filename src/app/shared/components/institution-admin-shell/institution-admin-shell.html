<section class="layout">
  <aside class="sidebar" aria-label="Navegación institucional">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <h2>SL ADMIN</h2>
    </div>

    <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>Dashboard</span>
    </a>
    <a routerLink="/admin/medicos" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"/><path d="m8.5 16.5-2.3-2.3a1 1 0 0 0-1.4 0l-2.1 2.1a1 1 0 0 0 0 1.4L5 20"/></svg>
      <span>Médicos</span>
    </a>
    <a routerLink="/admin/citas" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
      <span>Citas</span>
    </a>
    <a routerLink="/admin/pacientes" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg>
      <span>Pacientes</span>
    </a>
    <a routerLink="/admin/reportes" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/></svg>
      <span>Reportes</span>
    </a>
    <a routerLink="/admin/asistente" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a9 9 0 0 1 8.5 6"/><path d="M12 11v2"/><circle cx="12" cy="12" r="9"/></svg>
      <span>Asistente IA</span>
    </a>
    <a routerLink="/admin/facturacion" routerLinkActive="active" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      <span>Facturación</span>
    </a>
    <a routerLink="/admin/config" routerLinkActive="active" class="nav-item" [routerLinkActiveOptions]="{ exact: false }">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
      <span>Config.</span>
    </a>
  </aside>

  <div class="main">
    <header class="topbar">
      <nav class="topnav">
        <a routerLink="/admin/dashboard">Inicio</a>
        <a routerLink="/admin/config/mi-clinica" routerLinkActive="active">Mi clínica</a>
        <a routerLink="/admin/reportes" routerLinkActive="active">Reportes</a>
        <a routerLink="/contact">Soporte</a>
      </nav>
      <div class="topbar-actions">
        <span class="clinic-chip">🏥 {{ clinicName() }}</span>
        <button type="button" class="btn-logout" (click)="logout()">Cerrar sesión</button>
      </div>
    </header>
    <div class="content">
      <router-outlet />
    </div>
  </div>
</section>
