<section class="flow-shell">
  <aside class="left-pane">
    <div class="brand"><span class="plus">+</span> SaludLink</div>
    <h1>Crea tu cuenta de paciente</h1>
    <p>Empieza a tomar el control de tu salud en minutos.</p>
    <ul>
      <li>Datos cifrados extremo a extremo</li>
      <li>Cumplimiento Ley 29733</li>
      <li>Soporte 24/7</li>
    </ul>
  </aside>

  <div class="form-pane">
    <h2>Datos personales</h2>
    <div class="grid one">
      <label>Nombre completo<input placeholder="Lupe Ruben Cunyas Ramos" /></label>
      <label>Correo electrónico<input placeholder="luperuben@gmail.com" /></label>
    </div>
    <div class="grid two">
      <label>Contraseña<input type="password" placeholder="••••••••" /></label>
      <label>Confirmar<input type="password" placeholder="••••••••" /></label>
    </div>
    <label class="check"><input type="checkbox" checked /> Acepto los términos y la política de privacidad</label>
    <button type="button" class="submit" (click)="finish()">Crear mi cuenta</button>
  </div>
</section>
