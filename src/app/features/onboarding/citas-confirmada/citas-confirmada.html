<app-patient-dashboard-shell
  activeItem="citas"
  [userFirstName]="userFirstName()"
  (dashboard)="goDashboard()"
  (citas)="goCitasNav()"
  (recordatorios)="goRecordatorios()"
  (historial)="goHistorial()"
  (mental)="goMental()"
  (perfil)="goPerfil()"
  (planes)="goPlanes()"
  (config)="goConfig()"
  (logout)="logout()"
>
  <div class="success-screen">
    <div class="success-icon" aria-hidden="true">
      <span class="check-mark"></span>
    </div>

    <h1 class="success-title">Tu cita esta confirmada!</h1>
    <p class="success-subtitle">{{ emailHint() }}</p>

    <div class="appointment-card">
      <strong>{{ appointmentShortLabel() }}</strong>
      <span>{{ doctorLine() }}</span>
      <span class="muted">{{ locationLine() }}</span>
    </div>

    <div class="receipt-card">
      <div class="receipt-row">
        <span>N de pago</span>
        @if (loadingPayment()) {
          <strong>Cargando...</strong>
        } @else {
          <strong>{{ paymentRefLabel() }}</strong>
        }
      </div>
      <div class="receipt-row">
        <span>Comprobante</span>
        <button
          type="button"
          class="link-btn"
          [disabled]="!receiptNumber()"
          (click)="downloadReceipt()"
        >
          Descargar comprobante
        </button>
      </div>
    </div>

    @if (paymentError()) {
      <p class="form-error">{{ paymentError() }}</p>
    }

    <div class="actions-grid">
      <button type="button" class="btn-ghost action-btn" (click)="addToCalendar()">
        + Calendario
      </button>
      <button type="button" class="btn-outline action-btn" (click)="viewAppointments()">
        Ver mis citas
      </button>
      <button type="button" class="btn-primary action-btn" (click)="goDashboard()">
        Ir al dashboard
      </button>
    </div>
  </div>
</app-patient-dashboard-shell>
