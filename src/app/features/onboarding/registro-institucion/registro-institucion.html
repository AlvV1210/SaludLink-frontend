<section class="flow-shell institucion">
  <aside class="left-pane">
    <div class="brand"><span class="plus">+</span> SaludLink</div>
    <h1>Registra tu institución de salud</h1>
    <p>Centraliza la gestión de médicos, pacientes y reportes desde un solo panel.</p>
    <ul>
      <li>Gestión de médicos afiliados</li>
      <li>Reportes de no-shows</li>
      <li>Métricas en tiempo real</li>
    </ul>
  </aside>

  <div class="form-pane">
    <div class="steps">
      <span class="active">1. Datos</span>
      <span>2. RUC</span>
      <span>3. Admin</span>
    </div>
    <h2>Datos institucionales</h2>
    <div class="grid one">
      <label>Razón social<input placeholder="Clínica San Pablo S.A.C." /></label>
    </div>
    <div class="grid two">
      <label>Tipo de establecimiento<input placeholder="Clínica privada" /></label>
      <label>N° de RUC<input placeholder="20100123456" /></label>
    </div>
    <div class="grid one">
      <label>Dirección principal<input placeholder="Av. Salaverry 1850, Jesús María, Lima" /></label>
    </div>
    <div class="grid two">
      <label>Teléfono<input placeholder="+51 1 6105500" /></label>
      <label>Sedes<input placeholder="3 sedes" /></label>
    </div>
    <button type="button" class="submit" (click)="continue()">Continuar →</button>
  </div>
</section>
