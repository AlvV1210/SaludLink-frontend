<section class="profiles-shell">
  <h1>Selecciona tu perfil</h1>
  <p class="subtitle">Personalizaremos tu experiencia según el tipo de cuenta</p>

  <div class="cards">
    <button type="button" class="card" [class.active]="selected() === 'paciente'" (click)="setPerfil('paciente')">
      <div class="icon">👤</div>
      <h2>Soy Paciente</h2>
      <p>Agendar citas, recordatorios y orientación</p>
      <span>HU01 + HU02 + HU15</span>
    </button>

    <button type="button" class="card" [class.active]="selected() === 'medico'" (click)="setPerfil('medico')">
      <div class="icon">👨‍⚕️</div>
      <h2>Soy Profesional</h2>
      <p>Médico, enfermero o personal de salud</p>
      <span>HU01 + EP07</span>
    </button>

    <button type="button" class="card" [class.active]="selected() === 'institucion'" (click)="setPerfil('institucion')">
      <div class="icon">🏥</div>
      <h2>Soy Clínica</h2>
      <p>Hospital o clínica afiliada</p>
      <span>HU01 + HU21</span>
    </button>
  </div>

  <button type="button" class="continue-btn" (click)="continue()">Continuar →</button>

  <p class="login-link">
    ¿Ya tienes cuenta?
    <button type="button" (click)="goLogin()">Inicia sesión</button>
  </p>
</section>
