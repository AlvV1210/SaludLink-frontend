<app-patient-dashboard-shell
  activeItem="citas"
  [userFirstName]="userFirstName()"
  (dashboard)="goDashboard()"
  (citas)="goCitas()"
  (recordatorios)="goRecordatorios()"
  (historial)="goHistorial()"
  (mental)="goMental()"
  (perfil)="goPerfil()"
  (planes)="goPlanes()"
  (config)="goConfig()"
  (logout)="logout()"
>
  <div class="page-head payment-head">
    <div>
      <h1>Metodo de pago</h1>
      <p class="subtitle">Selecciona como deseas pagar</p>
    </div>
    <strong class="fee-badge">{{ feeLabel() }}</strong>
  </div>

  <div class="payment-methods">
    <button
      type="button"
      class="payment-option"
      [class.selected]="paymentMethod() === 'card'"
      (click)="selectPaymentMethod('card')"
    >
      <span class="payment-icon visa">VISA</span>
      <span class="payment-copy">
        <strong>Tarjeta de credito/debito</strong>
        <span>Visa, Mastercard, AmEx</span>
      </span>
      @if (paymentMethod() === 'card') {
        <span class="payment-dot" aria-hidden="true"></span>
      }
    </button>

    <button
      type="button"
      class="payment-option"
      [class.selected]="paymentMethod() === 'yape'"
      (click)="selectPaymentMethod('yape')"
    >
      <span class="payment-icon yape">YAPE</span>
      <span class="payment-copy">
        <strong>Yape / Plin</strong>
        <span>Pago instantaneo</span>
      </span>
      @if (paymentMethod() === 'yape') {
        <span class="payment-dot" aria-hidden="true"></span>
      }
    </button>
  </div>

  @if (paymentMethod() === 'card') {
    <label class="field">
      <span>Numero de tarjeta</span>
      <input
        type="text"
        inputmode="numeric"
        autocomplete="cc-number"
        placeholder="0000 0000 0000 0000"
        [ngModel]="cardNumber()"
        (ngModelChange)="cardNumber.set($event)"
      />
    </label>

    <div class="field-row">
      <label class="field">
        <span>MM/AA</span>
        <input
          type="text"
          inputmode="numeric"
          autocomplete="cc-exp"
          placeholder="MM/AA"
          maxlength="5"
          [ngModel]="expiry()"
          (ngModelChange)="expiry.set($event)"
        />
      </label>
      <label class="field">
        <span>CVV</span>
        <input
          type="password"
          inputmode="numeric"
          autocomplete="cc-csc"
          placeholder="CVV"
          maxlength="4"
          [ngModel]="cvv()"
          (ngModelChange)="cvv.set($event)"
        />
      </label>
    </div>

    <label class="field">
      <span>Titular</span>
      <input
        type="text"
        autocomplete="cc-name"
        placeholder="Nombre del titular"
        [ngModel]="cardholder()"
        (ngModelChange)="cardholder.set($event)"
      />
    </label>
  } @else {
    <p class="yape-note">Completa el pago con Yape o Plin desde tu app movil al confirmar.</p>
  }

  <p class="security-note">Pago seguro - Cifrado SSL - No guardamos tu CVV</p>

  @if (errorMessage()) {
    <p class="form-error">{{ errorMessage() }}</p>
  }

  <button
    type="button"
    class="btn-primary pay-now-btn"
    [disabled]="loading() || !canPay()"
    (click)="payNow()"
  >
    {{ loading() ? 'Procesando...' : payButtonLabel() }}
  </button>
</app-patient-dashboard-shell>
