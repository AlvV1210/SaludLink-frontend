<app-patient-dashboard-shell

  (dashboard)="goDashboard()"
  (citas)="goCitas()"
  (recordatorios)="goRecordatorios()"
  (historial)="goHistorial()"
  (mental)="goMental()"
  (perfil)="goPerfil()"

>

  <p class="subtitle">Filtra por especialidad y disponibilidad</p>
  <input class="input" value="cardiologia" />

  <section class="card item"><div class="avatar" style="background:#0f7662">CR</div><div><strong>Dr. Carlos Ram&iacute;rez</strong><div class="subtitle">Cardiolog&iacute;a · Hospital Lima · 4.6/5</div></div><strong style="color:#0f766e">S/150</strong></section>
  <div class="row" style="justify-content:flex-end"><button type="button" class="btn primary" (click)="next()">siguiente</button></div>
</app-patient-dashboard-shell>
