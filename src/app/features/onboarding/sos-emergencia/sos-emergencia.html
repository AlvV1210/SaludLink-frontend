<app-patient-dashboard-shell

  (dashboard)="goDashboard()"
  (citas)="goCitas()"
  (recordatorios)="goRecordatorios()"
  (historial)="goHistorial()"

      <strong>Emergencia activada</strong>
      <p>Selecciona el numero que necesitas</p>

    <article class="contact-card">

        <strong>SAMU</strong>

      <a href="tel:106">106</a>

    <article class="contact-card">
      <div>
        <strong>Bomberos</strong>

      </div>
      <a href="tel:116">116</a>
    </article>

    <article class="contact-card">
      <div>
        <strong>PNP</strong>
        <p>Policia Nacional del Peru</p>
      </div>
      <a href="tel:105">105</a>
    </article>

    <article class="contact-card emergency-person">
      <div>
        <strong>Contacto emergencia</strong>
        <p>Maria Schermacha (Madre)</p>
      </div>
      <a href="tel:+51999111222">999...222</a>
