<section class="layout">
  <aside class="sidebar" aria-label="Navegaci&oacute;n principal">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon" aria-hidden="true">+</div>
      <div class="sidebar-logo-text">SaludLink</div>
    </div>

    <button type="button" class="sidebar-item" [ngClass]="{ active: activeItem === 'dashboard' }" (click)="dashboard.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 10.5L12 3l9 7.5" />
        <path d="M5 9.5V21h14V9.5" />
      </svg>
      <span>Dashboard</span>
    </button>

    <button type="button" class="sidebar-item" [ngClass]="{ active: activeItem === 'citas' }" (click)="citas.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="17" rx="2" />
        <path d="M3 10h18" />
        <path d="M8 2v4M16 2v4" />
      </svg>
      <span>Citas M&eacute;dicas</span>
    </button>

    <button type="button" class="sidebar-item" [ngClass]="{ active: activeItem === 'recordatorios' }" (click)="recordatorios.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9a6 6 0 1 1 12 0c0 3.1 1.2 5.6 2.6 7H3.4C4.8 14.6 6 12.1 6 9Z" />
        <path d="M10 19a2 2 0 0 0 4 0" />
      </svg>
      <span>Recordatorios</span>
    </button>

    <button type="button" class="sidebar-item" [ngClass]="{ active: activeItem === 'historial' }" (click)="historial.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8Z" />
        <path d="M14 2v6h6" />
      </svg>
      <span>Historial Cl&iacute;nico</span>
    </button>

    <button type="button" class="sidebar-item" [ngClass]="{ active: activeItem === 'mental' }" (click)="mental.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78" /></svg>
      <span>Salud Mental</span>
    </button>

    <div class="sidebar-divider"></div>

    <button type="button" class="sidebar-item" [ngClass]="{ active: activeItem === 'perfil' }" (click)="perfil.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4" /><path d="M4 21v-2a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v2" /></svg>
      <span>Mi perfil</span>
    </button>

    <button type="button" class="sidebar-item" [ngClass]="{ active: activeItem === 'planes' }" (click)="planes.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="5" width="20" height="14" rx="2" />
        <path d="M2 10h20" />
      </svg>
      <span>Planes</span>
    </button>

    <div class="sidebar-divider"></div>

    <button type="button" class="sidebar-item" [ngClass]="{ active: activeItem === 'config' }" (click)="config.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 0 1-4 0v-.2a1 1 0 0 0-.6-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 0 1 0-4h.2a1 1 0 0 0 .9-.6 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2H9a1 1 0 0 0 .6-.9V4a2 2 0 0 1 4 0v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1V9c0 .4.2.7.6.9h.2a2 2 0 1 1 0 4h-.2a1 1 0 0 0-.9.6Z" />
      </svg>
      <span>Configuraci&oacute;n</span>
    </button>

    <button type="button" class="sidebar-item" (click)="logout.emit()">
      <svg class="sidebar-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <path d="M16 17l5-5-5-5" />
        <path d="M21 12H9" />
      </svg>
      <span>Log out</span>
    </button>

    <div class="sidebar-footer">SaludLink v2.0<br />&copy; 2026</div>
  </aside>

  <main class="main">
    <header class="topbar">
      <nav>Inicio - Funcionalidades - Planes - Contacto</nav>
      <span class="user-avatar" aria-label="Usuario">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20a8 8 0 0 1 16 0"></path>
        </svg>
      </span>
    </header>
    <section class="main-content">
      <ng-content></ng-content>
    </section>
  </main>
</section>
