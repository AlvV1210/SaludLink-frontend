<section class="recover-shell">
  <div class="card">
    <h1>Recuperar contraseña</h1>
    <p>Ingresa tu correo y te enviaremos un enlace de recuperación.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" formControlName="email" placeholder="tu@correo.com" />
      @if (form.controls.email.invalid && form.controls.email.touched) {
        <span class="error">Ingresa un correo válido.</span>
      }

      <button type="submit">Enviar enlace</button>
    </form>

    <button type="button" class="back" (click)="back()">Volver a iniciar sesión</button>
  </div>
</section>
