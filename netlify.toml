[build]
  command = "npm run build"
  publish = "dist/saludlink-frontend/browser"

[build.environment]
  NODE_VERSION = "22"

# La app llama a `/api` (ver src/environments/environment.ts).
# Actualiza la URL de Render tras desplegar el backend.
[[redirects]]
  from = "/api/*"
  to = "https://saludlink-api.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
